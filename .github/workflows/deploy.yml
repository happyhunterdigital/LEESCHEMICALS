name: Build and Deploy LEES CHEMICALS

# Trigger the workflow when code is pushed to the main branch
on:
  push:
    branches:
      - main
  # Allow running this workflow manually from the GitHub UI
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches standard modern LTS
          cache: 'npm'

      # Step 3: Install all dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Build the application (Frontend + Backend)
      - name: Build Application
        run: npm run build

      # Step 5: Copy the built files to your server via SSH/Rsync
      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          # These secrets must be configured in your GitHub Repository Settings
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: ${{ secrets.SERVER_TARGET_DIR }}
          
          # Exclude node_modules and git folders to speed up transfer
          EXCLUDE: "/node_modules/, /.git/, /.github/"

      # Step 6: Execute commands on the server to install prod dependencies and restart the app
      - name: Restart Server Process
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_TARGET_DIR }}
            # Install only production dependencies on the server
            npm install --production
            
            # Ensure the database file exists and has correct permissions
            if [ ! -f db.json ]; then
              echo "{}" > db.json
            fi
            chmod 666 db.json
            
            # Restart the PM2 process
            pm2 reload ecosystem.config.cjs || pm2 start ecosystem.config.cjs
            pm2 save
